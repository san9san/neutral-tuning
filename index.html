document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"e0232204-1142-467e-a06b-88d09d1ffdec\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"anonymous\">\n  \n  <script src=\"2d6f281a-8ced-4604-ad0f-0573709c0590\"><\u002Fscript>\n  <style>\n    html { scroll-behavior: smooth; }\n    image-slot, x-import { touch-action: pan-y; }\n    @media (max-width: 760px) {\n      [data-stack] { display: flex !important; flex-direction: column !important; gap: 44px !important; }\n      [data-stack] [data-photo] { min-height: 240px !important; height: 280px !important; }\n      [data-vname] { writing-mode: horizontal-tb !important; }\n      [data-vdivider] { width: auto !important; height: 1px !important; }\n    }\n    body { margin: 0; background: #FAFAF7; color: #222222; font-family: 'Shippori Mincho', serif; -webkit-font-smoothing: antialiased; }\n    a { color: #2C4A63; text-decoration: none; }\n    a:hover { color: #4E6E68; }\n    @keyframes ntFadeIn { from { opacity: 0; } to { opacity: 1; } }\n    @keyframes ntFadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }\n    @keyframes ntCharIn { from { opacity: 0; transform: translateY(16px); filter: blur(8px); } to { opacity: 1; transform: none; filter: blur(0); } }\n    @keyframes ntRipple { 0% { transform: scale(0.4); opacity: 0; } 25% { opacity: 0.55; } 100% { transform: scale(1); opacity: 0; } }\n    @keyframes ntMistA { 0% { transform: translate(-6%, -2%) scale(1); } 50% { transform: translate(5%, 4%) scale(1.15); } 100% { transform: translate(-6%, -2%) scale(1); } }\n    @keyframes ntMistB { 0% { transform: translate(4%, 3%) scale(1.1); } 50% { transform: translate(-5%, -4%) scale(1); } 100% { transform: translate(4%, 3%) scale(1.1); } }\n    @keyframes ntSlowZoom { 0% { transform: scale(1); } 50% { transform: scale(1.07); } 100% { transform: scale(1); } }\n    @keyframes ntScrollCue { 0% { transform: scaleY(0); transform-origin: top; } 45% { transform: scaleY(1); transform-origin: top; } 55% { transform: scaleY(1); transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ============ HERO ============ -->\n<section data-screen-label=\"ヒーロー\" data-hero=\"true\" style=\"position:relative; min-height:100vh; display:flex; flex-direction:column; overflow:hidden; background:linear-gradient(160deg,#182422 0%,#22322f 55%,#1a2624 100%); color:#EDEFEA;\">\n\n  <div data-ambient=\"zoom\" style=\"position:absolute; inset:-4%; animation:ntSlowZoom 70s ease-in-out infinite;\">\n    <x-import component-from-global-scope=\"image-slot\" id=\"hero-bg\" shape=\"rect\" credit=\"Photo by 志远 杨 on Unsplash\" placeholder=\"霧の森・水面など、静かな風景写真をここへ（背景としてゆっくり動きます）\" hint-size=\"100%,100%\" style=\"position:absolute; inset:0;\"><\u002Fx-import>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg, rgba(20,30,28,0.35) 0%, rgba(20,30,28,0.05) 40%, rgba(20,30,28,0.05) 75%, rgba(20,30,28,0.22) 100%);\"><\u002Fdiv>\n  <div data-ambient=\"mist\" style=\"position:absolute; left:-20%; top:-10%; width:80%; height:80%; pointer-events:none; background:radial-gradient(closest-side, rgba(140,170,160,0.14), rgba(140,170,160,0)); filter:blur(30px); animation:ntMistA 46s ease-in-out infinite;\"><\u002Fdiv>\n  <div data-ambient=\"mist\" style=\"position:absolute; right:-25%; bottom:-15%; width:90%; height:85%; pointer-events:none; background:radial-gradient(closest-side, rgba(110,140,150,0.12), rgba(110,140,150,0)); filter:blur(36px); animation:ntMistB 58s ease-in-out infinite;\"><\u002Fdiv>\n\n  <header style=\"position:relative; z-index:3; display:flex; align-items:baseline; justify-content:space-between; gap:24px; padding:34px clamp(24px,5vw,64px); pointer-events:none;\">\n    <div style=\"pointer-events:auto; font-family:'Shippori Mincho',serif; font-size:17px; letter-spacing:0.3em; color:#EDEFEA;\">Neutral Tuning<\u002Fdiv>\n    <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n      <nav style=\"pointer-events:auto; display:flex; gap:clamp(16px,3vw,36px); font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.18em;\">\n        <a href=\"#concept\" style=\"color:rgba(237,239,234,0.75); white-space:nowrap;\" style-hover=\"color:#EDEFEA\">考え方<\u002Fa>\n        <a href=\"#session\" style=\"color:rgba(237,239,234,0.75); white-space:nowrap;\" style-hover=\"color:#EDEFEA\">旅のご案内<\u002Fa>\n        <a href=\"#profile\" style=\"color:rgba(237,239,234,0.75); white-space:nowrap;\" style-hover=\"color:#EDEFEA\">プロフィール<\u002Fa>\n        <a href=\"#faq\" style=\"color:rgba(237,239,234,0.75); white-space:nowrap;\" style-hover=\"color:#EDEFEA\">よくあるご質問<\u002Fa>\n        <a href=\"#contact\" style=\"color:rgba(237,239,234,0.75); white-space:nowrap;\" style-hover=\"color:#EDEFEA\">お問い合わせ<\u002Fa>\n      <\u002Fnav>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n    <button sc-camel-on-click=\"{{ openMenu }}\" aria-label=\"メニュー\" style=\"position:fixed; top:20px; right:16px; z-index:40; background:rgba(20,29,27,0.6); backdrop-filter:blur(8px); border:1px solid rgba(237,239,234,0.25); border-radius:999px; cursor:pointer; padding:16px 15px; display:flex; flex-direction:column; gap:7px; align-items:center;\">\n      <span style=\"display:block; width:24px; height:1px; background:#EDEFEA;\"><\u002Fspan>\n      <span style=\"display:block; width:16px; height:1px; background:#EDEFEA;\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:50; background:rgba(20,29,27,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:36px; animation:ntFadeIn 0.4s ease both;\">\n      <button sc-camel-on-click=\"{{ closeMenu }}\" aria-label=\"閉じる\" style=\"position:absolute; top:30px; right:24px; background:none; border:none; cursor:pointer; padding:12px; color:#EDEFEA; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.2em;\">閉じる ×<\u002Fbutton>\n      <a href=\"#concept\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"color:#EDEFEA; font-size:17px; letter-spacing:0.24em; font-family:'Shippori Mincho',serif;\">考え方<\u002Fa>\n      <a href=\"#session\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"color:#EDEFEA; font-size:17px; letter-spacing:0.24em; font-family:'Shippori Mincho',serif;\">旅のご案内<\u002Fa>\n      <a href=\"#profile\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"color:#EDEFEA; font-size:17px; letter-spacing:0.24em; font-family:'Shippori Mincho',serif;\">プロフィール<\u002Fa>\n      <a href=\"#faq\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"color:#EDEFEA; font-size:17px; letter-spacing:0.24em; font-family:'Shippori Mincho',serif;\">よくあるご質問<\u002Fa>\n      <a href=\"#contact\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"color:#EDEFEA; font-size:17px; letter-spacing:0.24em; font-family:'Shippori Mincho',serif;\">お問い合わせ<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"position:relative; z-index:2; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:40px 24px 100px; pointer-events:none;\">\n    <h1 style=\"margin:0; font-weight:500; font-size:clamp(32px,5vw,60px); letter-spacing:0.16em; line-height:1.7; color:#FFFFFF; text-shadow:0 1px 20px rgba(20,30,28,0.45);\">\n      <span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 0.3s both;\">人<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 0.5s both;\">は<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 0.7s both;\">、<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 0.9s both;\">な<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 1.1s both;\">ぜ<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 1.3s both;\">止<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 1.5s both;\">ま<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 1.7s both;\">る<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 1.9s both;\">の<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 2.1s both;\">だ<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 2.3s both;\">ろ<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 2.5s both;\">う<\u002Fspan><span style=\"display:inline-block; opacity:0; animation:ntCharIn 2s ease 2.7s both;\">。<\u002Fspan>\n    <\u002Fh1>\n    <p style=\"margin:44px 0 0; opacity:0; animation:ntFadeUp 2.4s ease 3.4s both; font-size:clamp(14px,1.6vw,17px); letter-spacing:0.14em; line-height:2.4; color:#FFFFFF; text-shadow:0 1px 14px rgba(20,30,28,0.5);\">\n      その理由は、意志や能力だけでは、<br>説明できないのかもしれません。\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; z-index:2; bottom:0; left:50%; width:1px; height:72px; background:rgba(237,239,234,0.5); animation:ntScrollCue 3.4s ease-in-out infinite; pointer-events:none;\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ はじめに ============ -->\n<section data-screen-label=\"はじめに\" style=\"padding:clamp(120px,16vh,190px) 24px; display:flex; justify-content:center;\">\n  <div style=\"max-width:600px; width:100%;\">\n    <div data-reveal=\"1\" style=\"display:flex; justify-content:center; margin:0 0 56px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n      <svg width=\"120\" height=\"120\" sc-camel-view-box=\"0 0 120 120\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"60\" cy=\"60\" r=\"6\" fill=\"#4E6E68\" opacity=\"0.55\"><\u002Fcircle>\n        <circle data-ambient=\"ripple\" cx=\"60\" cy=\"60\" r=\"52\" stroke=\"#4E6E68\" stroke-width=\"1\" style=\"transform-box:fill-box; transform-origin:center; animation:ntRipple 7s ease-out infinite;\"><\u002Fcircle>\n        <circle data-ambient=\"ripple\" cx=\"60\" cy=\"60\" r=\"52\" stroke=\"#4E6E68\" stroke-width=\"1\" style=\"transform-box:fill-box; transform-origin:center; animation:ntRipple 7s ease-out 2.3s infinite;\"><\u002Fcircle>\n        <circle data-ambient=\"ripple\" cx=\"60\" cy=\"60\" r=\"52\" stroke=\"#4E6E68\" stroke-width=\"1\" style=\"transform-box:fill-box; transform-origin:center; animation:ntRipple 7s ease-out 4.6s infinite;\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <p data-reveal=\"1\" style=\"margin:0; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease; font-size:clamp(18px,2.2vw,23px); letter-spacing:0.1em; line-height:2.6;\">\n      休みたいのに、休めない。<br>\n      変わりたいのに、変われない。<br>\n      同じところで、同じように立ち止まってしまう。<br><br>\n      周囲からは、順調に見えている。<br>\n      仕事も役割も、果たしている。<br>\n      それでも、自分自身の感覚から<br>\n      少し離れているように感じる。\n    <\u002Fp>\n    <div data-reveal=\"1\" style=\"width:44px; height:1px; background:#4E6E68; margin:56px 0; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.2s, transform 1.6s ease 0.2s;\"><\u002Fdiv>\n    <p data-reveal=\"1\" style=\"margin:0; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.2s, transform 1.6s ease 0.2s; font-size:16px; letter-spacing:0.08em; line-height:2.6; color:#222222;\">\n      それは、弱さでも、怠けでもなく、<br>\n      これまで生きるために身につけてきた反応やパターンが、<br>\n      関係しているのかもしれません。<br><br>\n      Neutral Tuning は、自分という基準を取り戻し、<br>\n      本来持っている力を、自分が望む方向へ<br>\n      使えるようになるための場所です。\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 考え方 ============ -->\n<section id=\"concept\" data-screen-label=\"考え方\" style=\"padding:clamp(100px,14vh,170px) clamp(24px,5vw,64px); background:#F3F3EE;\">\n  <div data-stack=\"true\" style=\"max-width:1040px; margin:0 auto; display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:clamp(40px,6vw,96px); align-items:center;\">\n    <div data-reveal=\"1\" style=\"opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n      <p style=\"margin:0 0 28px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575;\">CONCEPT ─ 考え方<\u002Fp>\n      <h2 style=\"margin:0 0 40px; font-weight:500; font-size:clamp(24px,2.8vw,32px); letter-spacing:0.1em; line-height:1.9;\">「変える」より、<br>理解する。<\u002Fh2>\n      <p style=\"margin:0; font-size:15px; letter-spacing:0.06em; line-height:2.5; color:#222222;\">\n        私は、人は変わる必要はないと信じています。<br>\n        あなたには、すでに十分な力があります。必要なのは、その力を本来の方向へ使えるよう、基準を合わせ直すことです。<br><br>\n        人は、肩書きで語れるものではありません。成果や評価だけで測れる存在でもありません。どれほど成功していても、自分を見失うことはある——それは、真剣に生きてきた証です。<br><br>\n        だからここでは、自分に起きていることを理解するところから始めます。何を基準に生きてきたのかに気づくと、自分の感覚への信頼が戻り、選ぶ力が自分に返ってきます。\n      <\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" data-photo=\"true\" style=\"opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.25s, transform 1.6s ease 0.25s; position:relative; height:clamp(340px,48vw,520px); overflow:hidden;\">\n      <div data-ambient=\"zoom\" style=\"position:absolute; inset:-3%; animation:ntSlowZoom 60s ease-in-out infinite;\">\n        <x-import component-from-global-scope=\"image-slot\" id=\"concept-photo\" shape=\"rect\" credit=\"Photo by Ingmar on Unsplash\" placeholder=\"木漏れ日・朝の森など\" hint-size=\"100%,100%\" style=\"position:absolute; inset:0; filter:saturate(0.8);\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"position:absolute; inset:0; pointer-events:none; background:#3E5A5F; mix-blend-mode:color; opacity:0.5;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ニュートラルとは ============ -->\n<section id=\"neutral\" data-screen-label=\"ニュートラルとは\" style=\"padding:clamp(120px,16vh,190px) 24px; display:flex; justify-content:center;\">\n  <div style=\"max-width:640px; width:100%;\">\n    <p data-reveal=\"1\" style=\"margin:0 0 28px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575; text-align:center;\">NEUTRAL ─ ニュートラルとは<\u002Fp>\n    <h2 data-reveal=\"1\" style=\"margin:0 0 48px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.1s, transform 1.6s ease 0.1s; font-weight:500; font-size:clamp(24px,3vw,34px); letter-spacing:0.12em; line-height:2.1; text-align:center;\">ニュートラルとは、<br>「本来の自分」という基準に、<br>戻っている状態のこと。<\u002Fh2>\n    <p data-reveal=\"1\" style=\"margin:0 0 36px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.2s, transform 1.6s ease 0.2s; font-size:15px; letter-spacing:0.06em; line-height:2.6;\">\n      誰かの期待でも、社会の正解でもなく、自分自身の感覚を基準に選べる状態。<br><br>\n      役割はそのままでいい。積み上げてきたものも、そのままでいい。変わるのはただひとつ——選ぶときの「基準」が、自分に戻っているということです。\n    <\u002Fp>\n    <div data-reveal=\"1\" style=\"width:44px; height:1px; background:#4E6E68; margin:0 auto 36px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.25s, transform 1.6s ease 0.25s;\"><\u002Fdiv>\n    <p data-reveal=\"1\" style=\"margin:0; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.3s, transform 1.6s ease 0.3s; font-size:15px; letter-spacing:0.06em; line-height:2.6;\">\n      楽器の調律（チューニング）は、その楽器が本来持っている響きに、合わせ直す作業です。長く弾き込まれた楽器ほど、調律によって深い音を取り戻します。<br><br>\n      Neutral Tuning は、あなた本来の基準に合わせ直していく——その意味を込めた名前です。\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 引用バンド ============ -->\n<section data-screen-label=\"引用\" style=\"position:relative; overflow:hidden; background:linear-gradient(150deg,#1c2926 0%,#233330 60%,#1b2724 100%); color:#EDEFEA; padding:clamp(110px,15vh,180px) 24px; text-align:center;\">\n  <div data-ambient=\"mist\" style=\"position:absolute; left:-15%; top:-30%; width:70%; height:120%; pointer-events:none; background:radial-gradient(closest-side, rgba(140,170,160,0.13), rgba(140,170,160,0)); filter:blur(34px); animation:ntMistB 52s ease-in-out infinite;\"><\u002Fdiv>\n  <div data-ambient=\"mist\" style=\"position:absolute; right:-20%; bottom:-40%; width:80%; height:130%; pointer-events:none; background:radial-gradient(closest-side, rgba(110,140,150,0.11), rgba(110,140,150,0)); filter:blur(40px); animation:ntMistA 64s ease-in-out infinite;\"><\u002Fdiv>\n  <div data-reveal=\"1\" style=\"position:relative; opacity:0; transform:translateY(26px); transition:opacity 1.8s ease, transform 1.8s ease;\">\n    <p style=\"margin:0; font-size:clamp(20px,2.6vw,28px); font-weight:500; letter-spacing:0.16em; line-height:2.4;\">人は、変わる必要はない。<\u002Fp>\n    <p style=\"margin:28px 0 0; font-size:clamp(13px,1.5vw,15px); letter-spacing:0.12em; line-height:2.4; color:rgba(237,239,234,0.7);\">「変える」より、観察。「原因探し」より、理解。<br>取り戻すのは、本来の自分という基準です。<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 止まることについて ============ -->\n<section data-screen-label=\"止まることについて\" style=\"padding:clamp(120px,16vh,190px) clamp(24px,5vw,64px);\">\n  <div data-stack=\"true\" style=\"max-width:1040px; margin:0 auto; display:grid; grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr); gap:clamp(40px,6vw,96px); align-items:stretch;\">\n    <div data-reveal=\"1\" data-photo=\"true\" style=\"opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease; position:relative; min-height:clamp(320px,44vw,560px); overflow:hidden;\">\n      <div data-ambient=\"zoom\" style=\"position:absolute; inset:-3%; animation:ntSlowZoom 66s ease-in-out infinite;\">\n        <x-import component-from-global-scope=\"image-slot\" id=\"essay-photo\" shape=\"rect\" credit=\"Photo by Alex Lian on Unsplash\" placeholder=\"木の根・苔・岩など\" hint-size=\"100%,100%\" style=\"position:absolute; inset:0; filter:saturate(0.8);\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"position:absolute; inset:0; pointer-events:none; background:#3E5A5F; mix-blend-mode:color; opacity:0.5;\"><\u002Fdiv>\n      <div style=\"position:absolute; top:24px; right:24px; writing-mode:vertical-rl; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.5em; color:#FAFAF7; mix-blend-mode:difference; pointer-events:none;\">観察と、理解のために<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; justify-content:center;\">\n      <p data-reveal=\"1\" style=\"margin:0 0 28px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575;\">ESSAY ─ 止まることについて<\u002Fp>\n      <h2 data-reveal=\"1\" style=\"margin:0 0 40px; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.1s, transform 1.6s ease 0.1s; font-weight:500; font-size:clamp(24px,2.8vw,32px); letter-spacing:0.1em; line-height:1.9;\">頭ではわかっているのに、<br>動けない。<\u002Fh2>\n      <p data-reveal=\"1\" style=\"margin:0; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.2s, transform 1.6s ease 0.2s; font-size:15px; letter-spacing:0.06em; line-height:2.5;\">\n        返信を、なぜか後回しにしてしまう。<br>\n        休日なのに、休んだ気がしない。<br>\n        あと一歩のところで、手が止まる。<br><br>\n        こうした日常の小さな出来事の背景には、能力や意志だけでは説明できないプロセスがあると、私は考えています。<br><br>\n        苦しさは、弱さではありません。それは、人生を生き抜くために身につけてきた、適応のかたちです。<br><br>\n        そのプロセスを責めるのでも、無理に動かすのでもなく、まず読み解いてみる。理解が進むと、「止まる」ことの意味が変わり、選ぶことが、少しずつ自分に戻ってきます。<br><br>\n        止まることは、終わりではありません。それは、自分の基準で歩き直すための、静かな折り返し地点です。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ こんな方へ ============ -->\n<section id=\"foryou\" data-screen-label=\"こんな方へ\" style=\"padding:clamp(110px,15vh,180px) clamp(24px,5vw,64px);\">\n  <div data-stack=\"true\" style=\"max-width:1040px; margin:0 auto; display:grid; grid-template-columns:minmax(280px,1fr) minmax(0,1.1fr); gap:clamp(40px,6vw,96px); align-items:stretch;\">\n  <div data-reveal=\"1\" data-photo=\"true\" style=\"position:relative; min-height:360px; overflow:hidden; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <div data-ambient=\"zoom\" style=\"position:absolute; inset:-3%; animation:ntSlowZoom 64s ease-in-out infinite;\">\n      <x-import component-from-global-scope=\"image-slot\" id=\"foryou-photo\" shape=\"rect\" credit=\"Photo by Valentin on Unsplash\" placeholder=\"光の差す霧の森など\" hint-size=\"100%,100%\" style=\"position:absolute; inset:0; filter:saturate(0.8);\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"position:absolute; inset:0; pointer-events:none; background:#3E5A5F; mix-blend-mode:color; opacity:0.5;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div data-reveal=\"1\" style=\"opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.15s, transform 1.6s ease 0.15s; display:flex; flex-direction:column; justify-content:center;\">\n    <p style=\"margin:0 0 20px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575;\">FOR YOU ─ こんな方へ<\u002Fp>\n    <p style=\"margin:0 0 36px; font-size:14px; letter-spacing:0.08em; line-height:2.4; color:#757575;\">管理職、専門職、経営者、教育者、医療職——<br>役割を果たし、人を支え、成果を出してきた方へ。<br>そして、人生の後半を考え始めた方へ。<\u002Fp>\n    <div style=\"display:flex; flex-direction:column;\">\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">周囲からは、「うまくいっている人」に見えている<\u002Fp>\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">成果は出してきた。満たされているかと聞かれると、言葉に詰まる<\u002Fp>\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">役割を果たすほど、自分の輪郭が薄れていく気がする<\u002Fp>\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">相談される側で居続けて、自分の話をする場所がない<\u002Fp>\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">やりたいことはあるのに、なぜか動けない<\u002Fp>\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">この力を、もっと自分の望む方向に使いたいと感じている<\u002Fp>\n      <p style=\"margin:0; padding:22px 4px; border-top:1px solid rgba(78,110,104,0.25); border-bottom:1px solid rgba(78,110,104,0.25); font-size:15px; letter-spacing:0.08em; line-height:2;\">ふと、「私は何を基準に生きているのだろう」と思う夜がある<\u002Fp>\n    <\u002Fdiv>\n    <p style=\"margin:44px 0 0; font-size:14px; letter-spacing:0.08em; line-height:2.4; color:#757575;\">その問いは、役割を引き受けてきた人にだけ訪れる、<br>次の歩き方を探し始めた合図です。<\u002Fp>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ セッション ============ -->\n<section id=\"session\" data-screen-label=\"旅のご案内\" style=\"background:#F3F3EE; padding:clamp(110px,15vh,180px) 24px; display:flex; justify-content:center;\">\n  <div data-reveal=\"1\" style=\"max-width:600px; width:100%; text-align:center; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <div style=\"display:flex; justify-content:center; margin:0 0 32px;\">\n      <svg width=\"96\" height=\"60\" sc-camel-view-box=\"0 0 96 60\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"48\" cy=\"26\" r=\"14\" stroke=\"#4E6E68\" stroke-width=\"1\" opacity=\"0.6\"><\u002Fcircle>\n        <line x1=\"10\" y1=\"50\" x2=\"86\" y2=\"50\" stroke=\"#4E6E68\" stroke-width=\"1\" opacity=\"0.45\"><\u002Fline>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 28px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575;\">JOURNEY ─ 再調律の旅<\u002Fp>\n    <h2 style=\"margin:0 0 40px; font-weight:500; font-size:clamp(22px,2.6vw,28px); letter-spacing:0.12em; line-height:2;\">ここは、自分という基準を<br>思い出す場所です。<\u002Fh2>\n    <p style=\"margin:0; font-size:15px; letter-spacing:0.06em; line-height:2.5; color:#222222;\">\n      これは、「自分という基準」を取り戻し、<br>\n      本来持っている力を、望む方向へ使えるようになる旅です。<br><br>\n      理解する。つながり直す。そして、発揮する。<br>\n      三つの段階を、あなたのペースで歩きます。\n    <\u002Fp>\n\n    <div style=\"margin-top:72px; text-align:left; display:flex; flex-direction:column; gap:64px;\">\n\n      <div>\n        <p style=\"margin:0 0 20px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.3em; color:#4E6E68;\">FIRST STEP ─ 01<\u002Fp>\n        <h3 style=\"margin:0 0 28px; font-weight:500; font-size:clamp(20px,2.4vw,26px); letter-spacing:0.1em; line-height:1.8;\">現在地を知る<\u002Fh3>\n        <p style=\"margin:0 0 20px; font-size:15px; letter-spacing:0.06em; line-height:2.5;\">この段階で得られるのは、<strong style=\"font-weight:500;\">自分を理解するための地図<\u002Fstrong>です。何を基準に選択してきたのか。どんな役割を担い、どんな思考や反応のパターンがあるのか。なぜ今、立ち止まっているように感じるのか——それを一緒に整理します。<\u002Fp>\n        <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.3; color:#757575;\">この90分は、それだけで完結する時間です。続きを前提とせず、まず一度、自分自身を理解する時間として利用できます。そのあと旅を続けるかどうかは、あなたが選びます。<\u002Fp>\n        <div style=\"margin-top:32px; display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between; gap:12px 24px; padding:20px 24px; background:rgba(78,110,104,0.07); border-left:2px solid #4E6E68;\">\n          <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.14em; color:#757575;\">最初の対話　90分・1回<\u002Fp>\n          <p style=\"margin:0; flex:none; font-size:19px; letter-spacing:0.06em; color:#222222;\">¥33,000<span style=\"font-size:11px; color:#757575; margin-left:8px;\">税込<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid rgba(78,110,104,0.25); padding-top:64px;\">\n        <p style=\"margin:0 0 20px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.3em; color:#4E6E68;\">THE JOURNEY ─ 02<\u002Fp>\n        <h3 style=\"margin:0 0 28px; font-weight:500; font-size:clamp(20px,2.4vw,26px); letter-spacing:0.1em; line-height:1.8;\">本来の自分との再接続<\u002Fh3>\n        <p style=\"margin:0 0 20px; font-size:15px; letter-spacing:0.06em; line-height:2.5;\">この段階で得られるのは、<strong style=\"font-weight:500;\">誰かの期待や正解ではなく、自分の感覚を基準に選び直せる感覚<\u002Fstrong>です。役割に明け渡していた「選ぶ力」が、少しずつ自分に戻ってきます。<\u002Fp>\n        <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.3; color:#757575;\">対話による心理的理解を土台に、感情、身体感覚、無意識の反応、神経系の状態にも目を向けます。「頭では分かっているのに動けない」を、意志の弱さではなく心身の反応として理解していく。その方法のひとつとして、ブレインスポッティング（BSP）を必要に応じて用います。<\u002Fp>\n        <div style=\"margin-top:32px; display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between; gap:12px 24px; padding:20px 24px; background:rgba(78,110,104,0.07); border-left:2px solid #4E6E68;\">\n          <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.14em; color:#757575;\">3ヶ月の伴走　隔週の対話 全6回＋往復書簡<\u002Fp>\n          <p style=\"margin:0; flex:none; font-size:19px; letter-spacing:0.06em; color:#222222;\">¥198,000<span style=\"font-size:11px; color:#757575; margin-left:8px;\">税込<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid rgba(78,110,104,0.25); padding-top:64px;\">\n        <p style=\"margin:0 0 20px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.3em; color:#4E6E68;\">INTEGRATION ─ 03<\u002Fp>\n        <h3 style=\"margin:0 0 28px; font-weight:500; font-size:clamp(20px,2.4vw,26px); letter-spacing:0.1em; line-height:1.8;\">人生への統合<\u002Fh3>\n        <p style=\"margin:0 0 20px; font-size:15px; letter-spacing:0.06em; line-height:2.5;\">この段階で得られるのは、<strong style=\"font-weight:500;\">取り戻した基準で選び、本来の力を望む方向へ注げている実感<\u002Fstrong>です。仕事、人間関係、日々の選択——生活そのものが少しずつ調律されていきます。<\u002Fp>\n        <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.3; color:#757575;\">仕事、人間関係、人生の選択、新しい挑戦。ゴールは落ち着くことではなく、本当に望むことへ自然に集中し、持っている力を気持ちよく使えていること。整った後の人生を、ここで確かめながら歩きます。<\u002Fp>\n        <div style=\"margin-top:32px; display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between; gap:12px 24px; padding:20px 24px; background:rgba(78,110,104,0.07); border-left:2px solid #4E6E68;\">\n          <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.14em; color:#757575;\">継続の対話　月1回<\u002Fp>\n          <p style=\"margin:0; flex:none; font-size:19px; letter-spacing:0.06em; color:#222222;\">月額 ¥22,000<span style=\"font-size:11px; color:#757575; margin-left:8px;\">税込<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.12em; line-height:2.2; color:#757575;\">すべてオンライン。旅は「現在地を知る」から始まり、先へ進むかどうかは、そのつどご自身で選べます。治療や診断を目的とするものではありません。<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:52px;\">\n      <a href=\"#contact\" style=\"font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.24em; color:#4E6E68; border-bottom:1px solid #4E6E68; padding-bottom:6px;\" style-hover=\"color:#2C4A63; border-bottom:1px solid #2C4A63;\">お問い合わせへ<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ セッションの流れ ============ -->\n<section id=\"flow\" data-screen-label=\"セッションの流れ\" style=\"padding:clamp(110px,15vh,180px) 24px; display:flex; justify-content:center;\">\n  <div data-reveal=\"1\" style=\"max-width:640px; width:100%; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <div style=\"display:flex; justify-content:center; gap:20px; margin:0 0 32px; align-items:center;\">\n      <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><circle cx=\"10\" cy=\"10\" r=\"9\" stroke=\"#4E6E68\" stroke-width=\"1\" opacity=\"0.5\"><\u002Fcircle><\u002Fsvg>\n      <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><circle cx=\"10\" cy=\"10\" r=\"9\" stroke=\"#4E6E68\" stroke-width=\"1\" opacity=\"0.5\"><\u002Fcircle><circle cx=\"10\" cy=\"10\" r=\"3.5\" fill=\"#4E6E68\" opacity=\"0.5\"><\u002Fcircle><\u002Fsvg>\n      <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><circle cx=\"10\" cy=\"10\" r=\"9\" fill=\"#4E6E68\" opacity=\"0.55\"><\u002Fcircle><\u002Fsvg>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 56px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575; text-align:center;\">FLOW ─ 旅の始まり方<\u002Fp>\n    <div style=\"position:relative; display:flex; flex-direction:column; gap:44px;\">\n      <div style=\"position:absolute; left:13px; top:12px; bottom:12px; width:1px; background:rgba(78,110,104,0.25);\"><\u002Fdiv>\n      <div style=\"display:flex; gap:28px; align-items:baseline;\">\n        <span style=\"flex:none; position:relative; width:28px; text-align:center; font-size:15px; letter-spacing:0.05em; color:#4E6E68; background:#FAFAF7; padding:6px 0;\">01<\u002Fspan>\n        <div>\n          <p style=\"margin:0 0 10px; font-size:17px; letter-spacing:0.1em;\">ご予約<\u002Fp>\n          <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">メール・LINE・予約フォームのいずれかから、ご希望の日時をお知らせください。オンラインで行います。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:28px; align-items:baseline;\">\n        <span style=\"flex:none; position:relative; width:28px; text-align:center; font-size:15px; letter-spacing:0.05em; color:#4E6E68; background:#FAFAF7; padding:6px 0;\">02<\u002Fspan>\n        <div>\n          <p style=\"margin:0 0 10px; font-size:17px; letter-spacing:0.1em;\">現在地を知る（90分）<\u002Fp>\n          <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">今、何が起きているのかを、まず一緒に眺めてみます。話すことが決まっていなくてもかまいません。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:28px; align-items:baseline;\">\n        <span style=\"flex:none; position:relative; width:28px; text-align:center; font-size:15px; letter-spacing:0.05em; color:#4E6E68; background:#FAFAF7; padding:6px 0;\">03<\u002Fspan>\n        <div>\n          <p style=\"margin:0 0 10px; font-size:17px; letter-spacing:0.1em;\">旅を続けるかを、選ぶ<\u002Fp>\n          <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">「再接続」の3ヶ月へ進むかどうかは、初回のあとにゆっくり決めていただけます。こちらから継続をお勧めし続けることはありません。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 声 ============ -->\n<section data-screen-label=\"声\" style=\"background:#F3F3EE; padding:clamp(100px,14vh,160px) 24px; display:flex; justify-content:center;\">\n  <div data-reveal=\"1\" style=\"max-width:640px; width:100%; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <p style=\"margin:0 0 24px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575; text-align:center;\">VOICES ─ 旅をともにした方の言葉<\u002Fp>\n    <p aria-hidden=\"true\" style=\"margin:0 0 20px; text-align:center; font-size:56px; line-height:1; color:rgba(78,110,104,0.35);\">「<\u002Fp>\n    <div style=\"display:flex; flex-direction:column; gap:48px;\">\n      <div>\n        <p style=\"margin:0 0 14px; font-size:15px; letter-spacing:0.08em; line-height:2.4;\">「答えをもらったというより、自分が何を基準に選んできたのか、その輪郭が見えてきた感じです。」<\u002Fp>\n        <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.14em; color:#757575;\">── 50代・経営者<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 14px; font-size:15px; letter-spacing:0.08em; line-height:2.4;\">「止まっていた理由が言葉になったとき、自分を責める気持ちが、少し静かになりました。」<\u002Fp>\n        <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.14em; color:#757575;\">── 40代・医療職<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:48px 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.12em; color:#757575; text-align:center;\">※ ご本人の許可を得て掲載しています。<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 風景の帯 ============ -->\n<section data-screen-label=\"風景の帯\" style=\"position:relative; height:clamp(180px,28vh,300px); overflow:hidden;\">\n  <div data-ambient=\"zoom\" style=\"position:absolute; inset:-4%; animation:ntSlowZoom 74s ease-in-out infinite;\">\n    <x-import component-from-global-scope=\"image-slot\" id=\"divider-photo\" shape=\"rect\" credit=\"Photo by 志远 杨 on Unsplash\" placeholder=\"静かな遠景\" hint-size=\"100%,100%\" style=\"position:absolute; inset:0;\"><\u002Fx-import>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ プロフィール ============ -->\n<section id=\"profile\" data-screen-label=\"プロフィール\" style=\"padding:clamp(120px,16vh,190px) 24px; display:flex; justify-content:center;\">\n  <div data-reveal=\"1\" style=\"max-width:640px; width:100%; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <div style=\"display:flex; justify-content:center; margin:0 0 32px;\">\n      <div style=\"width:1px; height:44px; background:#4E6E68; opacity:0.5;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 56px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575; text-align:center;\">PROFILE ─ この文章を書いている人<\u002Fp>\n    <div style=\"display:flex; flex-wrap:wrap; gap:clamp(36px,6vw,72px); justify-content:center; align-items:stretch;\">\n      <div style=\"flex:none; display:flex; gap:20px; align-items:flex-start;\">\n        <p data-vname=\"true\" style=\"margin:0; writing-mode:vertical-rl; font-size:clamp(26px,3vw,34px); font-weight:500; letter-spacing:0.32em; line-height:1;\">萌葱 泉<\u002Fp>\n        <p data-vname=\"true\" style=\"margin:0; writing-mode:vertical-rl; font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; letter-spacing:0.3em; color:#757575;\">公認心理師<\u002Fp>\n      <\u002Fdiv>\n      <div data-vdivider=\"true\" style=\"width:1px; background:rgba(78,110,104,0.3);\"><\u002Fdiv>\n      <div style=\"max-width:440px; min-width:min(280px, 100%); flex:1;\">\n        <p style=\"margin:0; font-size:15px; letter-spacing:0.06em; line-height:2.5;\">\n          公認心理師として、心理的支援を続けてきました。<br><br>\n          多くの方と向き合うなかで関心を持ち続けてきたのは、「人は、なぜ止まるのか」という問いです。真面目で、責任感が強く、成果を出してきた——そんな十分に力のある方ほど、役割の内側で自分の基準を見失っていくのを、何度も見てきました。<br><br>\n          私は、人は役割よりも大きな存在だと信じています。そして苦しさは弱さではなく、人生を生き抜くために身につけてきた適応のかたちだと考えています。人の心と人生の節目に関わり続けるなかで、人を支える側の人ほど自分を後回しにしてしまう——その苦しさを、近くで見てきました。<br><br>\n          支援は対話を中心に、心理的理解に加えて、身体感覚への気づきや神経系の状態への理解を大切にしています。言葉だけでは扱いにくい感覚や反応のパターンに目を向けるため、ブレインスポッティング（BSP）などの専門的アプローチも、必要に応じて取り入れています。<br><br>\n          あなたが自分の基準で歩き直す姿を、いちばん近くで見届けること。それが、私の仕事です。対話はすべてオンラインで行っています。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FAQ ============ -->\n<section id=\"faq\" data-screen-label=\"よくあるご質問\" style=\"background:#F3F3EE; padding:clamp(110px,15vh,180px) 24px; display:flex; justify-content:center;\">\n  <div data-reveal=\"1\" style=\"max-width:640px; width:100%; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <div style=\"display:flex; justify-content:center; margin:0 0 32px;\">\n      <svg width=\"96\" height=\"56\" sc-camel-view-box=\"0 0 96 56\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"38\" cy=\"28\" r=\"18\" stroke=\"#4E6E68\" stroke-width=\"1\" opacity=\"0.55\"><\u002Fcircle>\n        <circle cx=\"58\" cy=\"28\" r=\"18\" stroke=\"#4E6E68\" stroke-width=\"1\" opacity=\"0.35\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 48px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575; text-align:center;\">FAQ ─ よくあるご質問<\u002Fp>\n    <details style=\"border-top:1px solid rgba(78,110,104,0.25); padding:24px 4px;\">\n      <summary style=\"cursor:pointer; font-size:15px; letter-spacing:0.08em; line-height:2;\">治療やカウンセリングとは、違うのですか？<\u002Fsummary>\n      <p style=\"margin:18px 0 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">治療や診断を目的とはしていません。「止まる」という日常のプロセスを観察し、理解していく時間です。医療的な支援が必要と思われる場合には、適切な機関をご案内します。<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid rgba(78,110,104,0.25); padding:24px 4px;\">\n      <summary style=\"cursor:pointer; font-size:15px; letter-spacing:0.08em; line-height:2;\">話すことが決まっていなくても、大丈夫ですか？<\u002Fsummary>\n      <p style=\"margin:18px 0 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">大丈夫です。「何を話せばいいかわからない」ことも、大切な出発点のひとつです。<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid rgba(78,110,104,0.25); padding:24px 4px;\">\n      <summary style=\"cursor:pointer; font-size:15px; letter-spacing:0.08em; line-height:2;\">ブレインスポッティング（BSP）とは何ですか？<\u002Fsummary>\n      <p style=\"margin:18px 0 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">言葉だけでは扱いにくい感覚や反応のパターンに目を向けるための、視野と身体感覚を用いた専門的アプローチです。BSPを受けること自体が目的ではなく、自分への理解を深め、基準を取り戻すために、必要に応じて対話に組み合わせて用います。<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid rgba(78,110,104,0.25); padding:24px 4px;\">\n      <summary style=\"cursor:pointer; font-size:15px; letter-spacing:0.08em; line-height:2;\">オンラインでも受けられますか？<\u002Fsummary>\n      <p style=\"margin:18px 0 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">はい。すべてのセッションをオンラインで行っています。静かに話せる場所からご参加ください。<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid rgba(78,110,104,0.25); padding:24px 4px;\">\n      <summary style=\"cursor:pointer; font-size:15px; letter-spacing:0.08em; line-height:2;\">「現在地を知る」だけで終えても、かまいませんか？<\u002Fsummary>\n      <p style=\"margin:18px 0 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">かまいません。旅を続けるかどうかは、そのつどご自身のペースで決めていただけます。こちらから継続をお勧めし続けることはありません。<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid rgba(78,110,104,0.25); border-bottom:1px solid rgba(78,110,104,0.25); padding:24px 4px;\">\n      <summary style=\"cursor:pointer; font-size:15px; letter-spacing:0.08em; line-height:2;\">話した内容の秘密は守られますか？<\u002Fsummary>\n      <p style=\"margin:18px 0 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.06em; line-height:2.2; color:#757575;\">公認心理師には法律上の守秘義務があります。お話しいただいた内容が外部に出ることはありません。<\u002Fp>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 読み物 ============ -->\n<section id=\"reading\" data-screen-label=\"読み物\" style=\"padding:clamp(100px,14vh,160px) clamp(24px,5vw,64px);\">\n  <div data-stack=\"true\" style=\"max-width:1040px; margin:0 auto; display:grid; grid-template-columns:minmax(0,1.1fr) minmax(280px,1fr); gap:clamp(40px,6vw,96px); align-items:center;\">\n  <div data-reveal=\"1\" style=\"opacity:0; transform:translateY(26px); transition:opacity 1.6s ease, transform 1.6s ease;\">\n    <p style=\"margin:0 0 28px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:#757575;\">READING ─ 読み物<\u002Fp>\n    <p style=\"margin:0 0 44px; font-size:15px; letter-spacing:0.08em; line-height:2.5;\">日常の小さな出来事から「止まる」を読み解く文章を、定期的に公開しています。<br>まずは、読むところから始めていただけます。<\u002Fp>\n    <a href=\"#reading\" style=\"font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.24em; color:#4E6E68; border-bottom:1px solid #4E6E68; padding-bottom:6px;\" style-hover=\"color:#2C4A63; border-bottom:1px solid #2C4A63;\">読み物を見る<\u002Fa>\n    <p style=\"margin:28px 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.12em; color:#757575;\">※ リンクは公開時にnote等の記事一覧へ接続します。<\u002Fp>\n  <\u002Fdiv>\n  <div data-reveal=\"1\" data-photo=\"true\" style=\"position:relative; min-height:320px; overflow:hidden; opacity:0; transform:translateY(26px); transition:opacity 1.6s ease 0.15s, transform 1.6s ease 0.15s;\">\n    <div data-ambient=\"zoom\" style=\"position:absolute; inset:-3%; animation:ntSlowZoom 58s ease-in-out infinite;\">\n      <x-import component-from-global-scope=\"image-slot\" id=\"reading-photo\" shape=\"rect\" credit=\"Photo by Tanya Barrow on Unsplash\" placeholder=\"夜明けの森など\" hint-size=\"100%,100%\" style=\"position:absolute; inset:0; filter:saturate(0.8);\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"position:absolute; inset:0; pointer-events:none; background:#3E5A5F; mix-blend-mode:color; opacity:0.5;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ お問い合わせ ============ -->\n<section id=\"contact\" data-screen-label=\"お問い合わせ\" style=\"position:relative; overflow:hidden; background:linear-gradient(160deg,#1a2624 0%,#22322f 100%); color:#EDEFEA; padding:clamp(120px,16vh,190px) 24px; text-align:center;\">\n  <div data-ambient=\"mist\" style=\"position:absolute; left:-10%; top:-35%; width:70%; height:130%; pointer-events:none; background:radial-gradient(closest-side, rgba(140,170,160,0.12), rgba(140,170,160,0)); filter:blur(36px); animation:ntMistA 56s ease-in-out infinite;\"><\u002Fdiv>\n  <div data-reveal=\"1\" style=\"position:relative; opacity:0; transform:translateY(26px); transition:opacity 1.8s ease, transform 1.8s ease;\">\n    <div style=\"display:flex; justify-content:center; margin:0 0 32px;\">\n      <svg width=\"96\" height=\"72\" sc-camel-view-box=\"0 0 96 72\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"48\" cy=\"36\" r=\"4\" fill=\"#EDEFEA\" opacity=\"0.6\"><\u002Fcircle>\n        <circle data-ambient=\"ripple\" cx=\"48\" cy=\"36\" r=\"32\" stroke=\"#EDEFEA\" stroke-width=\"1\" style=\"transform-box:fill-box; transform-origin:center; animation:ntRipple 7s ease-out infinite;\"><\u002Fcircle>\n        <circle data-ambient=\"ripple\" cx=\"48\" cy=\"36\" r=\"32\" stroke=\"#EDEFEA\" stroke-width=\"1\" style=\"transform-box:fill-box; transform-origin:center; animation:ntRipple 7s ease-out 3.5s infinite;\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 28px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.4em; color:rgba(237,239,234,0.55);\">CONTACT ─ お問い合わせ<\u002Fp>\n    <h2 style=\"margin:0 0 36px; font-weight:500; font-size:clamp(22px,2.6vw,28px); letter-spacing:0.14em; line-height:2;\">もう一度、自分の人生を<br>歩いてみたいと思ったら。<\u002Fh2>\n    <p style=\"margin:0 0 60px; font-size:14px; letter-spacing:0.1em; line-height:2.5; color:rgba(237,239,234,0.75);\">まずは、読むだけでかまいません。<br>話してみたいと思ったときに、どうぞ。<\u002Fp>\n    <div style=\"display:flex; justify-content:center; gap:20px; flex-wrap:wrap;\">\n      <a href=\"mailto:\" style=\"font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.2em; color:#EDEFEA; border:1px solid rgba(237,239,234,0.45); padding:16px 36px; min-width:150px;\" style-hover=\"background:rgba(237,239,234,0.1); border:1px solid #EDEFEA; color:#EDEFEA;\">メール<\u002Fa>\n      <a href=\"#contact\" style=\"font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.2em; color:#EDEFEA; border:1px solid rgba(237,239,234,0.45); padding:16px 36px; min-width:150px;\" style-hover=\"background:rgba(237,239,234,0.1); border:1px solid #EDEFEA; color:#EDEFEA;\">LINE<\u002Fa>\n      <a href=\"#contact\" style=\"font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px; letter-spacing:0.2em; color:#EDEFEA; border:1px solid rgba(237,239,234,0.45); padding:16px 36px; min-width:150px;\" style-hover=\"background:rgba(237,239,234,0.1); border:1px solid #EDEFEA; color:#EDEFEA;\">予約フォーム<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"margin:36px 0 0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.14em; color:rgba(237,239,234,0.45);\">※ 各リンクは、公開時にメールアドレス・LINE・予約フォームへ接続します。<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#141d1b; color:rgba(237,239,234,0.55); padding:44px 24px; text-align:center;\">\n  <p style=\"margin:0 0 18px; font-size:14px; letter-spacing:0.3em; color:rgba(237,239,234,0.8);\">Neutral Tuning<\u002Fp>\n  <div style=\"display:flex; justify-content:center; gap:28px; flex-wrap:wrap; margin:0 0 18px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.16em;\">\n    <a href=\"#contact\" style=\"color:rgba(237,239,234,0.55);\" style-hover=\"color:#EDEFEA\">利用規約<\u002Fa>\n    <a href=\"#contact\" style=\"color:rgba(237,239,234,0.55);\" style-hover=\"color:#EDEFEA\">キャンセルポリシー<\u002Fa>\n    <a href=\"#contact\" style=\"color:rgba(237,239,234,0.55);\" style-hover=\"color:#EDEFEA\">プライバシーポリシー<\u002Fa>\n  <\u002Fdiv>\n  <p style=\"margin:0; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; letter-spacing:0.2em;\">© {{ year }} Neutral Tuning ─ 公認心理師による心理的支援<\u002Fp>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;ambientMotion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;動き&quot;}}\">\nclass Component extends DCLogic {\n  state = { menuOpen: false, isMobile: false };\n\n  setupResponsive() {\n    this.mq = window.matchMedia('(max-width: 760px)');\n    const apply = () => this.setState({ isMobile: this.mq.matches, menuOpen: this.mq.matches ? this.state.menuOpen : false });\n    this.mqHandler = apply;\n    this.mq.addEventListener('change', apply);\n    apply();\n  }\n\n  applySources() {\n    const urls = {\"hero-bg\":\"https://images.unsplash.com/photo-1758637689499-b3b477a5fecb?fm=jpg&q=70&w=1600&auto=format&fit=crop\",\"divider-photo\":\"https://images.unsplash.com/photo-1758637689499-b3b477a5fecb?fm=jpg&q=70&w=1600&auto=format&fit=crop\",\"concept-photo\":\"https://images.unsplash.com/photo-1760479099643-b37a52e7c094?fm=jpg&q=70&w=1200&auto=format&fit=crop\",\"essay-photo\":\"https://images.unsplash.com/photo-1780840883415-6babdeaf9d70?fm=jpg&q=70&w=1200&auto=format&fit=crop\",\"foryou-photo\":\"https://images.unsplash.com/photo-1757353071874-38ba5deb546e?fm=jpg&q=70&w=1200&auto=format&fit=crop\",\"reading-photo\":\"https://images.unsplash.com/photo-1763202364215-7367e765ad3d?fm=jpg&q=70&w=1200&auto=format&fit=crop\"};\n    let tries = 0;\n    const tick = () => {\n      let pending = false;\n      Object.entries(urls).forEach(([id, u]) => {\n        const el = document.getElementById(id);\n        if (el) { if (el.getAttribute('src') !== u) el.setAttribute('src', u); }\n        else pending = true;\n      });\n      if (pending && tries++ < 40) setTimeout(tick, 250);\n    };\n    tick();\n  }\n\n  componentDidMount() {\n    this.setupResponsive();\n    if (!document.getElementById('nt-fonts')) {\n      const l = document.createElement('link');\n      l.id = 'nt-fonts';\n      l.rel = 'stylesheet';\n      l.href = 'https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap';\n      document.head.appendChild(l);\n    }\n    this.applySources();\n    this.io = new IntersectionObserver((entries) => {\n      for (const e of entries) {\n        if (e.isIntersecting) {\n          e.target.dataset.revealed = '1';\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this.io.unobserve(e.target);\n        }\n      }\n    }, { threshold: 0.15 });\n    this.syncReveals();\n    this.applyMotion();\n  }\n\n  componentDidUpdate() {\n    this.syncReveals();\n    this.applyMotion();\n  }\n\n  componentWillUnmount() {\n    if (this.io) this.io.disconnect();\n    if (this.mq && this.mqHandler) this.mq.removeEventListener('change', this.mqHandler);\n  }\n\n  syncReveals() {\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (el.dataset.revealed === '1') {\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n      } else {\n        this.io.observe(el);\n      }\n    });\n  }\n\n  applyMotion() {\n    const on = this.props.ambientMotion ?? true;\n    document.querySelectorAll('[data-ambient]').forEach((el) => {\n      el.style.animationPlayState = on ? 'running' : 'paused';\n    });\n  }\n\n  renderVals() {\n    return {\n      year: new Date().getFullYear(),\n      isMobile: this.state.isMobile,\n      isDesktop: !this.state.isMobile,\n      menuOpen: this.state.menuOpen,\n      openMenu: () => this.setState({ menuOpen: true }),\n      closeMenu: () => this.setState({ menuOpen: false })\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
